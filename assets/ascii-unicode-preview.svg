<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">ASCII-safe text converted into readable Unicode</title>
  <desc id="desc">A terminal style before and after preview with ASCII escape sequences on the left and readable Unicode output on the right.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#11171a"/>
      <stop offset="1" stop-color="#080a0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#32ff66" stop-opacity=".12"/>
      <stop offset=".5" stop-color="#6ee7ff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#f4a52c" stop-opacity=".12"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#32ff66" stroke-opacity=".07"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .label { fill: #6ee7ff; font-size: 18px; font-weight: 800; letter-spacing: 0; }
      .muted { fill: #9cb6a4; font-size: 15px; }
      .code { fill: #32ff66; font-size: 28px; font-weight: 700; }
      .out { fill: #f2f4df; font-size: 34px; font-weight: 800; }
      .small { font-size: 20px; }
    </style>
  </defs>

  <rect width="960" height="540" fill="#08090b"/>
  <rect width="960" height="540" fill="url(#grid)"/>
  <rect x="0" y="0" width="960" height="540" fill="url(#glow)"/>

  <text x="48" y="60" class="mono label">ASCII TO UNICODE CONVERTER</text>
  <text x="48" y="90" class="mono muted">Decode escapes, entities, U+ codes, bytes, and mojibake in one page.</text>

  <g filter="url(#softShadow)">
    <rect x="48" y="126" width="360" height="318" rx="0" fill="url(#panel)" stroke="#6ee7ff" stroke-opacity=".28"/>
    <rect x="48" y="126" width="360" height="42" fill="#101316" stroke="#6ee7ff" stroke-opacity=".28"/>
    <circle cx="72" cy="147" r="5" fill="#ff6b8a"/>
    <circle cx="92" cy="147" r="5" fill="#f4a52c"/>
    <circle cx="112" cy="147" r="5" fill="#32ff66"/>
    <text x="132" y="153" class="mono label">ASCII-safe input</text>

    <text x="78" y="214" class="mono muted">&gt; paste escaped text</text>
    <text x="78" y="254" class="mono code">\u0048\u0069</text>
    <text x="78" y="298" class="mono code">&amp;#x2603;</text>
    <text x="78" y="342" class="mono code">U+1F680</text>
    <text x="78" y="386" class="mono code">cafÃ©</text>
  </g>

  <g>
    <rect x="430" y="242" width="100" height="58" fill="#3a2510" stroke="#f4a52c" stroke-width="2"/>
    <path d="M416 271H540" fill="none" stroke="#f4a52c" stroke-width="4" stroke-linecap="square"/>
    <path d="M540 271l-20-16v32z" fill="#f4a52c"/>
    <text x="456" y="278" class="mono label" fill="#f4a52c" stroke="#3a2510" stroke-width="5" stroke-linejoin="round" paint-order="stroke fill">RUN</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="552" y="126" width="360" height="318" rx="0" fill="url(#panel)" stroke="#32ff66" stroke-opacity=".34"/>
    <rect x="552" y="126" width="360" height="42" fill="#101316" stroke="#32ff66" stroke-opacity=".34"/>
    <circle cx="576" cy="147" r="5" fill="#ff6b8a"/>
    <circle cx="596" cy="147" r="5" fill="#f4a52c"/>
    <circle cx="616" cy="147" r="5" fill="#32ff66"/>
    <text x="636" y="153" class="mono label">Unicode output</text>

    <text x="582" y="214" class="mono muted">&gt; readable result</text>
    <text x="582" y="258" class="mono out">Hi</text>
    <text x="582" y="306" class="mono out">☃</text>
    <text x="582" y="354" class="mono out">🚀</text>
    <text x="582" y="402" class="mono out">café</text>
  </g>

  <rect x="48" y="474" width="864" height="34" fill="#0d1113" stroke="#32ff66" stroke-opacity=".24"/>
  <text x="68" y="497" class="mono muted">Local browser conversion · no result-page jump · copy or download output</text>
</svg>
